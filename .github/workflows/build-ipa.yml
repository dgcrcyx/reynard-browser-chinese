name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 360
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 0
    
    - name: Initialize submodules
      run: |
        # 先处理 idevice 子模块
        git submodule init support/idevice || true
        git submodule update --init --depth 1 -- support/idevice || true
        
        # engine/firefox 不通过 submodule 机制处理，由 update-gecko.sh 脚本自己管理
        # 这里只确保目录存在且为空（如果已有内容且不是 git 仓库则清理）
        if [ -d "engine/firefox" ] && [ ! -d "engine/firefox/.git" ]; then
          echo "engine/firefox exists but is not a git repo, removing..."
          rm -rf engine/firefox
        fi
        
        echo "Preparing engine/firefox directory..."
        mkdir -p engine/firefox
        
        echo "Directory status:"
        ls -la engine/
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-ios
    
    - name: Install ldid
      run: |
        brew install ldid
    
    - name: Download Gecko
      run: |
        chmod +x ./tools/development/update-gecko.sh
        ./tools/development/update-gecko.sh
    
    - name: Apply patches
      run: |
        chmod +x ./tools/development/apply-patches.sh
        ./tools/development/apply-patches.sh
    
    - name: Build idevice
      run: |
        chmod +x ./tools/development/build-idevice.sh
        ./tools/development/build-idevice.sh
    
    - name: Build Gecko engine
      run: |
        chmod +x ./tools/development/build-gecko.sh
        ./tools/development/build-gecko.sh
    
    - name: Build app
      run: |
        chmod +x ./tools/release/build-app.sh
        ./tools/release/build-app.sh
    
    - name: Create IPA
      run: |
        chmod +x ./tools/release/create-ipa.sh
        ./tools/release/create-ipa.sh
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Reynard-IPA
        path: |
          dist/Reynard.ipa
          dist/Reynard-TrollStore.tipa
          dist/Reynard-Jailbroken.ipa
        retention-days: 30
