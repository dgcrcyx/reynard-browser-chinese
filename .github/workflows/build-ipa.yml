name: Build IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 🌟 修改 1：升级至最新的 macos-26 环境（支持 iOS 26 SDK）
    runs-on: macos-26
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      # 🌟 修改 2：利用官方插件一键切换并激活最新的 Xcode 26.4
      - name: Set up Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      # 🌟 修改 3：强制让系统的命令行工具（如 mach 用到的 clang）指向正确的 Xcode 路径并打印验证
      - name: Verify and Force Select Xcode SDK
        run: |
          echo "==== 当前 /Applications 下的 Xcode 版本 ===="
          ls -la /Applications/ | grep -i xcode || true
          
          echo "==== 强制设置 xcode-select 路径 ===="
          if [ -d "/Applications/Xcode_26.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          
          echo "==== 最终生效的 SDK 版本校验 ===="
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Initialize submodules
        run: |
          echo "Preparing directories..."
          for dir in "engine/firefox" "support/idevice"; do
            if [ -d "$dir" ] && [ ! -d "$dir/.git" ]; then
              echo "$dir exists but is not a git repo, removing..."
              rm -rf "$dir"
            fi
          done
          echo "Directory status:"
          ls -la engine/ 2>/dev/null || echo "engine/ not found"
          ls -la support/ 2>/dev/null || echo "support/ not found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install ldid
        run: |
          brew install ldid

      - name: Download Gecko
        run: |
          chmod +x ./tools/development/update-gecko.sh
          ./tools/development/update-gecko.sh

      - name: Apply patches
        run: |
          chmod +x ./tools/development/apply-patches.sh
          ./tools/development/apply-patches.sh

      - name: Build idevice
        run: |
          chmod +x ./tools/development/build-idevice.sh
          ./tools/development/build-idevice.sh

      - name: Build Gecko engine
        run: |
          chmod +x ./tools/development/build-gecko.sh
          ./tools/development/build-gecko.sh

      - name: Build app
        run: |
          chmod +x ./tools/release/build-app.sh
          ./tools/release/build-app.sh

      - name: Create IPA
        run: |
          chmod +x ./tools/release/create-ipa.sh
          ./tools/release/create-ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Reynard-IPA
          path: |
            dist/Reynard-Unsigned.ipa
            dist/Reynard.ipa
            dist/Reynard-TrollStore.tipa
            dist/Reynard-Jailbroken.ipa
          retention-days: 30
