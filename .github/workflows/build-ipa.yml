name: Build IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 1. 升级至搭载 macOS Tahoe 与支持 iOS 26 SDK 的最新环境
    runs-on: macos-26
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      # 2. 显式切换并激活云端的 Xcode 26.4
      - name: Set up Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      # 3. 强制重定向系统命令行工具并输出 SDK 版本信息校验
      - name: Verify and Force Select Xcode SDK
        run: |
          echo "==== 当前 /Applications 下的 Xcode 版本 ===="
          ls -la /Applications/ | grep -i xcode || true
          
          echo "==== 强制设置 xcode-select 路径 ===="
          if [ -d "/Applications/Xcode_26.4.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          
          echo "==== 最终生效的 SDK 版本校验 ===="
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Initialize submodules
        run: |
          echo "Preparing directories..."
          for dir in "engine/firefox" "support/idevice"; do
            if [ -d "$dir" ] && [ ! -d "$dir/.git" ]; then
              echo "$dir exists but is not a git repo, removing..."
              rm -rf "$dir"
            fi
          done
          echo "Directory status:"
          ls -la engine/ 2>/dev/null || echo "engine/ not found"
          ls -la support/ 2>/dev/null || echo "support/ not found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install ldid
        run: |
          brew install ldid

      # 4. 关键修复：安装 LLVM 工具链以提供 Gecko 引擎必须的 lld 链接器
      - name: Install LLVM (lld) for Gecko Build
        run: |
          brew install llvm
          brew install lld
          # 将 llvm 的可执行文件路径追加进 GitHub Actions 的全局环境变量中
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix lld)/bin" >> $GITHUB_PATH
          # 建立全局软链接，防止 mach 脚本探查不到硬路径
          # macOS 上 lld 的命令名是 ld64.lld，创建一个 lld 别名方便调用
          sudo ln -sf $(brew --prefix lld)/bin/ld64.lld /usr/local/bin/lld
          sudo ln -sf $(brew --prefix lld)/bin/ld64.lld /usr/local/bin/ld64.lld
          echo "==== 验证 lld 链接器可用性 ===="
          ld64.lld --version

      - name: Download Gecko
        run: |
          chmod +x ./tools/development/update-gecko.sh
          ./tools/development/update-gecko.sh

      - name: Apply patches
        run: |
          chmod +x ./tools/development/apply-patches.sh
          ./tools/development/apply-patches.sh

      - name: Build idevice
        run: |
          chmod +x ./tools/development/build-idevice.sh
          ./tools/development/build-idevice.sh

      - name: Build Gecko engine
        run: |
          chmod +x ./tools/development/build-gecko.sh
          ./tools/development/build-gecko.sh

      - name: Build app
        run: |
          chmod +x ./tools/release/build-app.sh
          ./tools/release/build-app.sh

      - name: Create IPA
        run: |
          chmod +x ./tools/release/create-ipa.sh
          ./tools/release/create-ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Reynard-IPA
          path: |
            dist/Reynard-Unsigned.ipa
            dist/Reynard.ipa
            dist/Reynard-TrollStore.tipa
            dist/Reynard-Jailbroken.ipa
          retention-days: 30
