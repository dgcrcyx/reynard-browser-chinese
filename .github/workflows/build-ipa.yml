name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 360
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Initialize submodules
      run: |
        # 先确保 .gitmodules 中的子模块配置被注册
        git submodule init
        
        # 检查 engine/firefox 是否已注册
        if ! git submodule status -- engine/firefox >/dev/null 2>&1; then
          echo "Submodule not registered, manually registering..."
          # 手动注册子模块到 git 配置（不克隆）
          git config submodule.engine/firefox.url https://github.com/mozilla-firefox/firefox
          git config -f .gitmodules submodule.engine/firefox.path engine/firefox
          git config -f .gitmodules submodule.engine/firefox.url https://github.com/mozilla-firefox/firefox
          git submodule init engine/firefox
        fi
        
        echo "Submodule registered. Now doing shallow update..."
        # 浅克隆子模块
        git submodule update --init --depth 1 -- engine/firefox || true
        
        echo "Submodule status:"
        git submodule status
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-ios
    
    - name: Install ldid
      run: |
        brew install ldid
    
    - name: Download Gecko
      run: |
        chmod +x ./tools/development/update-gecko.sh
        ./tools/development/update-gecko.sh
    
    - name: Apply patches
      run: |
        chmod +x ./tools/development/apply-patches.sh
        ./tools/development/apply-patches.sh
    
    - name: Build idevice
      run: |
        chmod +x ./tools/development/build-idevice.sh
        ./tools/development/build-idevice.sh
    
    - name: Build Gecko engine
      run: |
        chmod +x ./tools/development/build-gecko.sh
        ./tools/development/build-gecko.sh
    
    - name: Build app
      run: |
        chmod +x ./tools/release/build-app.sh
        ./tools/release/build-app.sh
    
    - name: Create IPA
      run: |
        chmod +x ./tools/release/create-ipa.sh
        ./tools/release/create-ipa.sh
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Reynard-IPA
        path: |
          dist/Reynard.ipa
          dist/Reynard-TrollStore.tipa
          dist/Reynard-Jailbroken.ipa
        retention-days: 30
